<label class="row"><input type="checkbox" data-n="702"> <span class="num">702</span> <span class="ttl">In some way or other, the Lord will provide</span></label>
<label class="row"><input type="checkbox" data-n="703"> <span class="num">703</span> <span class="ttl">Speed away!  speed away, over mountains and sea</span></label>
<label class="row"><input type="checkbox" data-n="704"> <span class="num">704</span> <span class="ttl">Could you wait, could you wait if a brother were lost</span></label>
<label class="row"><input type="checkbox" data-n="707"> <span class="num">707</span> <span class="ttl">Zion stands with walls surrounded</span></label>
<label class="row"><input type="checkbox" data-n="711"> <span class="num">711</span> <span class="ttl">Revive Thy work, O Lord, Thy mighty arm make bare</span></label>
<label class="row"><input type="checkbox" data-n="712"> <span class="num">712</span> <span class="ttl">If, through unruffled seas</span></label>
<label class="row"><input type="checkbox" data-n="713"> <span class="num">713</span> <span class="ttl">"My times are in thy hand:"</span></label>
<label class="row"><input type="checkbox" data-n="715"> <span class="num">715</span> <span class="ttl">Sow in the morn thy seed</span></label>
<label class="row"><input type="checkbox" data-n="717"> <span class="num">717</span> <span class="ttl">Speak often to each other</span></label>
<label class="row"><input type="checkbox" data-n="718"> <span class="num">718</span> <span class="ttl">The world is very evil</span></label>
<label class="row"><input type="checkbox" data-n="719"> <span class="num">719</span> <span class="ttl">The morning light is breaking</span></label>
<label class="row"><input type="checkbox" data-n="720"> <span class="num">720</span> <span class="ttl">Work, for the night is coming</span></label>
<label class="row"><input type="checkbox" data-n="721"> <span class="num">721</span> <span class="ttl">There is no work too humble</span></label>
<label class="row"><input type="checkbox" data-n="722"> <span class="num">722</span> <span class="ttl">Carry the joyful tidings</span></label>
<label class="row"><input type="checkbox" data-n="724"> <span class="num">724</span> <span class="ttl">How cheering is the Christian's hope</span></label>
<label class="row"><input type="checkbox" data-n="726"> <span class="num">726</span> <span class="ttl">God moves in a mysterious way</span></label>
<label class="row"><input type="checkbox" data-n="728"> <span class="num">728</span> <span class="ttl">We bless Thee for Thy peace, O God</span></label>
<label class="row"><input type="checkbox" data-n="729"> <span class="num">729</span> <span class="ttl">Saviour, like a shepherd lead us</span></label>
<label class="row"><input type="checkbox" data-n="730"> <span class="num">730</span> <span class="ttl">God has said, Forever blessed</span></label>
<label class="row"><input type="checkbox" data-n="731"> <span class="num">731</span> <span class="ttl">Always with us, always with us</span></label>
<label class="row"><input type="checkbox" data-n="732"> <span class="num">732</span> <span class="ttl">Meek and lowly, pure and holy</span></label>
<label class="row"><input type="checkbox" data-n="733"> <span class="num">733</span> <span class="ttl">Tossed upon life's raging billow</span></label>
<label class="row"><input type="checkbox" data-n="734"> <span class="num">734</span> <span class="ttl">Watchman, tell me, does the morning</span></label>
<label class="row"><input type="checkbox" data-n="736"> <span class="num">736</span> <span class="ttl">Long upon the mountains, weary</span></label>
<label class="row"><input type="checkbox" data-n="737"> <span class="num">737</span> <span class="ttl">Mid scenes of confusion and creature complaints</span></label>
<label class="row"><input type="checkbox" data-n="738"> <span class="num">738</span> <span class="ttl">Mid pleasures and palaces though we may roam</span></label>
<label class="row"><input type="checkbox" data-n="739"> <span class="num">739</span> <span class="ttl">Kind words can never die</span></label>
<label class="row"><input type="checkbox" data-n="740"> <span class="num">740</span> <span class="ttl">Out on an ocean all boundless we ride</span></label>
<label class="row"><input type="checkbox" data-n="741"> <span class="num">741</span> <span class="ttl">Sweet hour of pray'r, sweet hour of pray'r</span></label>
<label class="row"><input type="checkbox" data-n="742"> <span class="num">742</span> <span class="ttl">My days are gliding swiftly by</span></label>
<label class="row"><input type="checkbox" data-n="744"> <span class="num">744</span> <span class="ttl">Thus far the Lord has led me on</span></label>
<label class="row"><input type="checkbox" data-n="745"> <span class="num">745</span> <span class="ttl">My spirit on thy care</span></label>
<label class="row"><input type="checkbox" data-n="746"> <span class="num">746</span> <span class="ttl">I ask not, Lord, for less to bear</span></label>
<label class="row"><input type="checkbox" data-n="747"> <span class="num">747</span> <span class="ttl">Children of the heav'nly King</span></label>
<label class="row"><input type="checkbox" data-n="751"> <span class="num">751</span> <span class="ttl">Ye Christian heralds!  go, proclaim</span></label>
<label class="row"><input type="checkbox" data-n="752"> <span class="num">752</span> <span class="ttl">Soldiers of Christ, arise</span></label>
<label class="row"><input type="checkbox" data-n="753"> <span class="num">753</span> <span class="ttl">The tempter to my soul hath said</span></label>
<label class="row"><input type="checkbox" data-n="755"> <span class="num">755</span> <span class="ttl">This is the day of toil</span></label>
<label class="row"><input type="checkbox" data-n="756"> <span class="num">756</span> <span class="ttl">How blest the sacred tie that binds</span></label>
<label class="row"><input type="checkbox" data-n="758"> <span class="num">758</span> <span class="ttl">When waves of trouble round me swell</span></label>
<label class="row"><input type="checkbox" data-n="761"> <span class="num">761</span> <span class="ttl">God make my life a little light</span></label>
<label class="row"><input type="checkbox" data-n="763"> <span class="num">763</span> <span class="ttl">Come, Holy Spirit, heav'nly Dove</span></label>
<label class="row"><input type="checkbox" data-n="766"> <span class="num">766</span> <span class="ttl">How precious is the book divine</span></label>
<label class="row"><input type="checkbox" data-n="769"> <span class="num">769</span> <span class="ttl">The Lord's my Shepherd, I'll not want</span></label>
<label class="row"><input type="checkbox" data-n="771"> <span class="num">771</span> <span class="ttl">Zion, awake!  thy slumber break</span></label>
<label class="row"><input type="checkbox" data-n="772"> <span class="num">772</span> <span class="ttl">How sweet, how heav'nly is the sight</span></label>
<label class="row"><input type="checkbox" data-n="774"> <span class="num">774</span> <span class="ttl">The day is past and gone</span></label>
<label class="row"><input type="checkbox" data-n="776"> <span class="num">776</span> <span class="ttl">Lord, in the morning thou shalt hear</span></label>
<label class="row"><input type="checkbox" data-n="783"> <span class="num">783</span> <span class="ttl">He who seeks the truth, and trembles</span></label>
<label class="row"><input type="checkbox" data-n="785"> <span class="num">785</span> <span class="ttl">Prince of Peace, control my will</span></label>
<label class="row"><input type="checkbox" data-n="786"> <span class="num">786</span> <span class="ttl">Blest are the pure in heart</span></label>
<label class="row"><input type="checkbox" data-n="790"> <span class="num">790</span> <span class="ttl">God's law demands one living faith</span></label>
<label class="row"><input type="checkbox" data-n="792"> <span class="num">792</span> <span class="ttl">O Christ, with each returning morn</span></label>
<label class="row"><input type="checkbox" data-n="793"> <span class="num">793</span> <span class="ttl">Awake my soul!  stretch ev'ry nerve</span></label>
<label class="row"><input type="checkbox" data-n="797"> <span class="num">797</span> <span class="ttl">O Master, let me walk with thee</span></label>
<label class="row"><input type="checkbox" data-n="800"> <span class="num">800</span> <span class="ttl">Softly fades the twilight ray</span></label>
<label class="row"><input type="checkbox" data-n="803"> <span class="num">803</span> <span class="ttl">Blessed Bible, how I love it!</span></label>
<label class="row"><input type="checkbox" data-n="804"> <span class="num">804</span> <span class="ttl">Sister, thou wast mild and lovely</span></label>
<label class="row"><input type="checkbox" data-n="806"> <span class="num">806</span> <span class="ttl">Jesus, while our hearts are bleeding</span></label>
<label class="row"><input type="checkbox" data-n="808"> <span class="num">808</span> <span class="ttl">In grief and fear, to thee, O Lord</span></label>
<label class="row"><input type="checkbox" data-n="809"> <span class="num">809</span> <span class="ttl">What is the chaff, the word of man</span></label>
<label class="row"><input type="checkbox" data-n="811"> <span class="num">811</span> <span class="ttl">Walk in the light!</span></label>
<label class="row"><input type="checkbox" data-n="812"> <span class="num">812</span> <span class="ttl">Father, whate'er of earthly bliss</span></label>
<label class="row"><input type="checkbox" data-n="813"> <span class="num">813</span> <span class="ttl">O could our thoughts and wishes fly</span></label>
<label class="row"><input type="checkbox" data-n="814"> <span class="num">814</span> <span class="ttl">'Tis by the faith of joys to come</span></label>
<label class="row"><input type="checkbox" data-n="816"> <span class="num">816</span> <span class="ttl">My country, 'tis of thee</span></label>
<label class="row"><input type="checkbox" data-n="818"> <span class="num">818</span> <span class="ttl">God bless our native land!</span></label>
<label class="row"><input type="checkbox" data-n="819"> <span class="num">819</span> <span class="ttl">The Lord worketh, let us work too</span></label>
<label class="row"><input type="checkbox" data-n="820"> <span class="num">820</span> <span class="ttl">Shepherd divine, thou leadest me</span></label>
<label class="row"><input type="checkbox" data-n="821"> <span class="num">821</span> <span class="ttl">For Jesus, all my morning hours</span></label>
<label class="row"><input type="checkbox" data-n="823"> <span class="num">823</span> <span class="ttl">Calm me, my God, and keep me calm</span></label>
<label class="row"><input type="checkbox" data-n="825"> <span class="num">825</span> <span class="ttl">O blessed hour, when ev'ning comes,</span></label>
<label class="row"><input type="checkbox" data-n="826"> <span class="num">826</span> <span class="ttl">O love divine, that stooped to share</span></label>
<label class="row"><input type="checkbox" data-n="827"> <span class="num">827</span> <span class="ttl">O blest are they who oft have said</span></label>
<label class="row"><input type="checkbox" data-n="829"> <span class="num">829</span> <span class="ttl">Still with thee, O my God!</span></label>
<label class="row"><input type="checkbox" data-n="836"> <span class="num">836</span> <span class="ttl">O teach me, Lord, that I may teach</span></label>
<label class="row"><input type="checkbox" data-n="837"> <span class="num">837</span> <span class="ttl">How gentle God's commands!</span></label>
<label class="row"><input type="checkbox" data-n="838"> <span class="num">838</span> <span class="ttl">Spirit of truth and might</span></label>
<label class="row"><input type="checkbox" data-n="839"> <span class="num">839</span> <span class="ttl">The Lord bless us and keep us</span></label>
<label class="row"><input type="checkbox" data-n="840"> <span class="num">840</span> <span class="ttl">Now the day is over</span></label>
<label class="row"><input type="checkbox" data-n="841"> <span class="num">841</span> <span class="ttl">Lord, keep us safe this night</span></label>
<label class="row"><input type="checkbox" data-n="844"> <span class="num">844</span> <span class="ttl">Thou Coming One, our wants relieve</span></label>
<label class="row"><input type="checkbox" data-n="845"> <span class="num">845</span> <span class="ttl">How far from home!  I asked, as on</span></label>
<label class="row"><input type="checkbox" data-n="847"> <span class="num">847</span> <span class="ttl">A thrilling cry--we hear the sound</span></label>
<label class="row"><input type="checkbox" data-n="848"> <span class="num">848</span> <span class="ttl">We shall meet beyond the river</span></label>
<label class="row"><input type="checkbox" data-n="849"> <span class="num">849</span> <span class="ttl">When my life work is ended, and I cross the swelling tide</span></label>
<label class="row"><input type="checkbox" data-n="850"> <span class="num">850</span> <span class="ttl">Beautiful valley of Eden</span></label>
<label class="row"><input type="checkbox" data-n="851"> <span class="num">851</span> <span class="ttl">Above the clouds that veil the blue</span></label>
<label class="row"><input type="checkbox" data-n="852"> <span class="num">852</span> <span class="ttl">When He cometh, when he cometh</span></label>
<label class="row"><input type="checkbox" data-n="853"> <span class="num">853</span> <span class="ttl">Down life's dark vale we wander</span></label>
<label class="row"><input type="checkbox" data-n="854"> <span class="num">854</span> <span class="ttl">There'll be no dark valley when Jesus comes</span></label>
<label class="row"><input type="checkbox" data-n="855"> <span class="num">855</span> <span class="ttl">The Homeland!  O the Homeland!</span></label>
<label class="row"><input type="checkbox" data-n="856"> <span class="num">856</span> <span class="ttl">We shall reach the summer land</span></label>
<label class="row"><input type="checkbox" data-n="857"> <span class="num">857</span> <span class="ttl">Our Lord is now rejected</span></label>
<label class="row"><input type="checkbox" data-n="858"> <span class="num">858</span> <span class="ttl">Light after darkness</span></label>
<label class="row"><input type="checkbox" data-n="859"> <span class="num">859</span> <span class="ttl">When we lay our burdens down</span></label>
<label class="row"><input type="checkbox" data-n="860"> <span class="num">860</span> <span class="ttl">Lord, I care not for riches</span></label>
<label class="row"><input type="checkbox" data-n="861"> <span class="num">861</span> <span class="ttl">Face to face with Christ my Saviour</span></label>
<label class="row"><input type="checkbox" data-n="862"> <span class="num">862</span> <span class="ttl">In the land of fadeless day</span></label>
<label class="row"><input type="checkbox" data-n="863"> <span class="num">863</span> <span class="ttl">O there'll be joy when the work is done</span></label>
<label class="row"><input type="checkbox" data-n="864"> <span class="num">864</span> <span class="ttl">In the glad time of the harvest</span></label>
<label class="row"><input type="checkbox" data-n="865"> <span class="num">865</span> <span class="ttl">When the trumpet of the Lord shall sound, and time shall be no more</span></label>
<label class="row"><input type="checkbox" data-n="866"> <span class="num">866</span> <span class="ttl">With friends on earth we meet in gladness</span></label>
<label class="row"><input type="checkbox" data-n="867"> <span class="num">867</span> <span class="ttl">It maybe at morn, when the day is awaking</span></label>
<label class="row"><input type="checkbox" data-n="868"> <span class="num">868</span> <span class="ttl">Are you ready for the Bridegroom</span></label>
<label class="row"><input type="checkbox" data-n="869"> <span class="num">869</span> <span class="ttl">We shall walk with him in white</span></label>
<label class="row"><input type="checkbox" data-n="870"> <span class="num">870</span> <span class="ttl">"We would see Jesus;" for the shadows lengthen</span></label>
<label class="row"><input type="checkbox" data-n="871"> <span class="num">871</span> <span class="ttl">Who are these whose songs are sounding</span></label>
<label class="row"><input type="checkbox" data-n="872"> <span class="num">872</span> <span class="ttl">We shall meet beyond the skies</span></label>
<label class="row"><input type="checkbox" data-n="873"> <span class="num">873</span> <span class="ttl">Breaking thro' the clouds that gather</span></label>
<label class="row"><input type="checkbox" data-n="874"> <span class="num">874</span> <span class="ttl">Sorrow and care may meet</span></label>
<label class="row"><input type="checkbox" data-n="875"> <span class="num">875</span> <span class="ttl">Soul amid earth sorrows dwelling</span></label>
<label class="row"><input type="checkbox" data-n="876"> <span class="num">876</span> <span class="ttl">When I shall awake in that fair morn of morns</span></label>
<label class="row"><input type="checkbox" data-n="877"> <span class="num">877</span> <span class="ttl">Watch, ye saints, with eyelids waking</span></label>
<label class="row"><input type="checkbox" data-n="878"> <span class="num">878</span> <span class="ttl">We know not the hour of the Master's appearing</span></label>
<label class="row"><input type="checkbox" data-n="879"> <span class="num">879</span> <span class="ttl">There's a land that is fairer than day</span></label>
<label class="row"><input type="checkbox" data-n="880"> <span class="num">880</span> <span class="ttl">Oh, glory to God!  it is coming again</span></label>
<label class="row"><input type="checkbox" data-n="881"> <span class="num">881</span> <span class="ttl">I am waiting for the morning</span></label>
<label class="row"><input type="checkbox" data-n="882"> <span class="num">882</span> <span class="ttl">One sweetly solemn tho't</span></label>
<label class="row"><input type="checkbox" data-n="883"> <span class="num">883</span> <span class="ttl">There is a land mine eyes hath seen</span></label>
<label class="row"><input type="checkbox" data-n="884"> <span class="num">884</span> <span class="ttl">Some day the silver cord will break</span></label>
<label class="row"><input type="checkbox" data-n="885"> <span class="num">885</span> <span class="ttl">We know not the time when He cometh</span></label>
<label class="row"><input type="checkbox" data-n="886"> <span class="num">886</span> <span class="ttl">When thou comest in Thy kingdom</span></label>
<label class="row"><input type="checkbox" data-n="887"> <span class="num">887</span> <span class="ttl">Come, we that love the Lord</span></label>
<label class="row"><input type="checkbox" data-n="888"> <span class="num">888</span> <span class="ttl">Beautiful city, haven of peace</span></label>
<label class="row"><input type="checkbox" data-n="889"> <span class="num">889</span> <span class="ttl">Angel voices sweetly singing</span></label>
<label class="row"><input type="checkbox" data-n="890"> <span class="num">890</span> <span class="ttl">Who, who are these beyond the chilly wave</span></label>
<label class="row"><input type="checkbox" data-n="891"> <span class="num">891</span> <span class="ttl">When we hear the music ringing</span></label>
<label class="row"><input type="checkbox" data-n="892"> <span class="num">892</span> <span class="ttl">The golden morning is fast approaching</span></label>
<label class="row"><input type="checkbox" data-n="893"> <span class="num">893</span> <span class="ttl">When the mists have rolled in splendor</span></label>
<label class="row"><input type="checkbox" data-n="894"> <span class="num">894</span> <span class="ttl">Sweet promise is giv'n to all who believe</span></label>
<label class="row"><input type="checkbox" data-n="896"> <span class="num">896</span> <span class="ttl">Awake, ye saints, and raise your eyes</span></label>
<label class="row"><input type="checkbox" data-n="900"> <span class="num">900</span> <span class="ttl">There is a place of sacred rest</span></label>
<label class="row"><input type="checkbox" data-n="903"> <span class="num">903</span> <span class="ttl">Hail to the brightness of Zion's glad morning!</span></label>
<label class="row"><input type="checkbox" data-n="904"> <span class="num">904</span> <span class="ttl">Daughter of Zion, awake from thy sadness</span></label>
<label class="row"><input type="checkbox" data-n="905"> <span class="num">905</span> <span class="ttl">On Jordan's stormy banks I stand</span></label>
<label class="row"><input type="checkbox" data-n="907"> <span class="num">907</span> <span class="ttl">Shall we gather at the river</span></label>
<label class="row"><input type="checkbox" data-n="908"> <span class="num">908</span> <span class="ttl">"Forever with the Lord!"</span></label>
<label class="row"><input type="checkbox" data-n="909"> <span class="num">909</span> <span class="ttl">We are joyously voyaging over the main</span></label>
<label class="row"><input type="checkbox" data-n="910"> <span class="num">910</span> <span class="ttl">"Land ahead!"  its fruits are waving</span></label>
<label class="row"><input type="checkbox" data-n="913"> <span class="num">913</span> <span class="ttl">"This same Jesus!"  O how sweetly</span></label>
<label class="row"><input type="checkbox" data-n="914"> <span class="num">914</span> <span class="ttl">How sweet are the tidings that greet the pilgrim's ear</span></label>
<label class="row"><input type="checkbox" data-n="919"> <span class="num">919</span> <span class="ttl">I will sing you a song of that beautiful land</span></label>
<label class="row"><input type="checkbox" data-n="921"> <span class="num">921</span> <span class="ttl">Shall we meet beyond the river</span></label>
<label class="row"><input type="checkbox" data-n="922"> <span class="num">922</span> <span class="ttl">When Jesus calls His jewels</span></label>
<label class="row"><input type="checkbox" data-n="923"> <span class="num">923</span> <span class="ttl">The time is near when Zion's sons</span></label>
<label class="row"><input type="checkbox" data-n="924"> <span class="num">924</span> <span class="ttl">When God descends with men to dwell</span></label>
<label class="row"><input type="checkbox" data-n="925"> <span class="num">925</span> <span class="ttl">We've no abiding city here</span></label>
<label class="row"><input type="checkbox" data-n="926"> <span class="num">926</span> <span class="ttl">Thy kingdom come.  Thus day by day</span></label>
<label class="row"><input type="checkbox" data-n="927"> <span class="num">927</span> <span class="ttl">When I can read my title clear</span></label>
<label class="row"><input type="checkbox" data-n="928"> <span class="num">928</span> <span class="ttl">In the Christian's home in glory</span></label>
<label class="row"><input type="checkbox" data-n="929"> <span class="num">929</span> <span class="ttl">Lift up the trumpet, and loud let it ring</span></label>
<label class="row"><input type="checkbox" data-n="930"> <span class="num">930</span> <span class="ttl">The coming King is at the door</span></label>
<label class="row"><input type="checkbox" data-n="931"> <span class="num">931</span> <span class="ttl">Sweet be thy rest</span></label>
<label class="row"><input type="checkbox" data-n="932"> <span class="num">932</span> <span class="ttl">Soon shall we meet again</span></label>
<label class="row"><input type="checkbox" data-n="933"> <span class="num">933</span> <span class="ttl">Break, break, eternal day</span></label>
<label class="row"><input type="checkbox" data-n="934"> <span class="num">934</span> <span class="ttl">On the mountain top appearing</span></label>
<label class="row"><input type="checkbox" data-n="935"> <span class="num">935</span> <span class="ttl">O'er the distant mountain breaking</span></label>
<label class="row"><input type="checkbox" data-n="936"> <span class="num">936</span> <span class="ttl">Christ is coming!  let creation</span></label>
<label class="row"><input type="checkbox" data-n="938"> <span class="num">938</span> <span class="ttl">The glories of that heav'nly land</span></label>
<label class="row"><input type="checkbox" data-n="939"> <span class="num">939</span> <span class="ttl">In the sun, and moon, and stars</span></label>
<label class="row"><input type="checkbox" data-n="941"> <span class="num">941</span> <span class="ttl">Dear as thou wert, and justly dear</span></label>
<label class="row"><input type="checkbox" data-n="942"> <span class="num">942</span> <span class="ttl">She hath passed death's chilling billow</span></label>
<label class="row"><input type="checkbox" data-n="943"> <span class="num">943</span> <span class="ttl">There'll be no grief in heav'n</span></label>
<label class="row"><input type="checkbox" data-n="944"> <span class="num">944</span> <span class="ttl">Meet again when time is o'er</span></label>
<label class="row"><input type="checkbox" data-n="945"> <span class="num">945</span> <span class="ttl">When thou, my righteous Judge, shalt come</span></label>
<label class="row"><input type="checkbox" data-n="946"> <span class="num">946</span> <span class="ttl">O how I long to see that day</span></label>
<label class="row"><input type="checkbox" data-n="947"> <span class="num">947</span> <span class="ttl">My rest is in heaven, my rest is not here</span></label>
<label class="row"><input type="checkbox" data-n="948"> <span class="num">948</span> <span class="ttl">I'm weary.  I'm fainting; my day's work is done</span></label>
<label class="row"><input type="checkbox" data-n="949"> <span class="num">949</span> <span class="ttl">No tears in yonder home</span></label>
<label class="row"><input type="checkbox" data-n="950"> <span class="num">950</span> <span class="ttl">God spake all these words</span></label>
<label class="row"><input type="checkbox" data-n="951"> <span class="num">951</span> <span class="ttl">Lord, have mercy, have mercy upon us</span></label>
</div>

<script>
 const boxes=[...document.querySelectorAll('input')];
 function upd(){document.getElementById('c').textContent=boxes.filter(b=>b.checked).length}
 boxes.forEach(b=>b.addEventListener('change',upd));
 function cp(){const m=boxes.filter(b=>b.checked).map(b=>b.dataset.n);
  document.getElementById('out').value=m.join(', ');
  navigator.clipboard&&navigator.clipboard.writeText(m.join(', '));}
</script>
